<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <!-- Front Side -->
    <div class="front">
      <div class="hover-text">Hover To Open</div>
      <div class="cover-shape-large">
        <div class="shape-block"></div>
        <div class="shape-diamond"></div>
      </div>
      <div class="cover-shape-small">
        <div class="shape-block"></div>
        <div class="shape-diamond"></div>
      </div>
      <div class="cake">
        <div class="layer layer-top"></div>
        <div class="layer layer-middle"></div>
        <div class="layer layer-bottom"></div>
        <div class="icing"></div>
        <div class="drip drip1"></div>
        <div class="drip drip2"></div>
        <div class="drip drip3"></div>
        <div class="candle"></div>
        <div class="flame"></div>
      </div>
    </div>

    <!-- Back Side -->
    <div class="back">
      <div class="text-container">
        <div id="head">Happy Birthday Bestie!</div>
        <div>Your first digital birthday card!</div>
        <div>Developed Just For You.</div>
        <div>Enjoy and Have It A Blast!💥</div>
      </div>
    </div>
  </div>
</body>
</html>
